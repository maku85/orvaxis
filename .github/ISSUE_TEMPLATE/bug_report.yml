name: Bug Report
description: Report a bug or unexpected behavior in Orvaxis
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal code snippet or repository that reproduces the issue.
      render: typescript
      placeholder: |
        import { Orvaxis } from "orvaxis"

        const app = new Orvaxis()
        // ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      description: Which HTTP adapter are you using?
      options:
        - Express
        - Fastify
        - None (standalone)
        - Other
    validations:
      required: true

  - type: input
    id: orvaxis-version
    attributes:
      label: Orvaxis version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant information (related issues, links, etc.)
